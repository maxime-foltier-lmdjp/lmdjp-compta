Une dépense importante non prévue de plus de 200 € (le piano, par exemple) doit être validée en assemblée, avec un budget maximum, avant d'engager l'argent de la SCI.

En revanche, toutes les petites dépenses qui participent à équiper la maison, remplacer des éléments consommés ou réparer ce qui est cassé ne sont pas à voter en AG — elles sont au contraire largement souhaitées.

## 1.4 Règles comptables

### La date qui compte : la date de valeur

On enregistre toujours la **date de valeur** (quand l'argent est effectivement débité du compte), jamais la date d'opération (quand tu tapes ta carte). Les deux peuvent différer d'un ou deux jours.

### Le sens des montants

- Une **sortie** d'argent (dépense) = montant **négatif**
- Une **entrée** d'argent (apport, remboursement reçu) = montant **positif**

### Les types d'apports des associés

| Type | Ce que c'est |
|------|--------------|

| **Appel de fonds exceptionnel** | Une contribution ponctuelle pour un besoin précis |

### La ventilation

Quand un seul paiement couvre plusieurs catégories (ex : une commande Bricomarché moitié cuisine, moitié jardin), on le découpe en plusieurs lignes — une par catégorie — dont la somme égale le paiement d'origine.

### Le remboursement d'une avance

Quand la SCI rembourse un associé qui a avancé des frais, la ligne est catégorisée selon **la nature de l'achat** (ex : des outils → Travaux/Outils), pas comme un simple transfert. Le prénom de l'associé dans le libellé signale que c'est un remboursement.

Toutes les opérations se rangent dans 4 catégories de premier niveau (CAT 1), chacune déclinée en sous-catégories (CAT 2) puis en détails (CAT 3) :

1. **Flux financiers associés** — apports, avances, appels de fonds
2. **Achats et frais initiaux** — achat de la maison, frais de notaire, création SCI
3. **Charges et frais courants** — taxes, assurances, consommables, abonnements, JPP
4. **Travaux et investissements** — tous les chantiers de la maison, par pièce/thème

- les **formules SUMIFS** des onglets de synthèse, qui filtrent sur les libellés **exacts** (Trésorerie, Apports associés, Achats initiaux, Charges, Suivi budget travaux)
- la constante **\`TAXONOMY\`** dans la web app (et les règles d'auto-catégorisation \`autoCatRow\`)

L'impact dépend du type de changement. Trois cas.

#### Cas 1 — Ajouter une nouvelle catégorie (CAT2 ou CAT3)
1. Ajouter la ligne dans l'onglet **Catégories** (au bon niveau, sous la bonne CAT1/CAT2)
2. Relancer **⚙️ SCI Tools → Initialiser le Journal** (met à jour les listes déroulantes)

#### Cas 2 — Renommer une catégorie existante
C'est le cas **le plus dangereux** : les formules SUMIFS filtrent sur le libellé en dur, donc un renommage les casse silencieusement (elles renvoient 0 sans erreur visible).
1. Renommer dans l'onglet **Catégories**
2. **Mettre à jour toutes les formules** qui référencent l'ancien libellé dans : Trésorerie, Apports associés, Achats initiaux, Charges, Suivi budget travaux. Utiliser Édition → Rechercher et remplacer (Cmd+H) sur tout le classeur, en remplaçant l'ancien libellé exact par le nouveau.

6. Reclasser les anciennes lignes du Journal qui portaient l'ancien libellé (sinon elles ne sont plus comptées)

> 💡 Après un renommage, vérifier qu'aucun total n'est tombé à 0 de façon suspecte — c'est le signe d'une formule restée sur l'ancien libellé.

#### Cas 3 — Supprimer ou fusionner une catégorie
1. Reclasser dans le Journal toutes les lignes portant la catégorie à supprimer vers la catégorie cible
2. Supprimer la ligne dans **Catégories**

**Versionnage du Google Sheet** : Google Sheets enregistre automatiquement chaque modification dans un **historique des versions** (Fichier → Historique des versions → Afficher l'historique des versions), consultable et restaurable par le propriétaire et les éditeurs. Deux limites à connaître sur un compte gratuit : l'historique détaillé est conservé environ **30 jours ou 100 versions** (au premier atteint), au-delà Google fusionne et purge les versions intermédiaires pour gagner de la place — la version courante n'est jamais supprimée. Il n'existe pas de filtre par date dans l'historique (défilement manuel). Pour figer un état important (clôture d'exercice, gros budget), le réflexe est de **nommer la version** (Fichier → Historique des versions → Nommer la version actuelle) : les versions nommées sont préservées et faciles à retrouver.

> 💡 Avant une opération risquée (renommage de catégorie, gros collage), nommer la version courante permet d'y revenir proprement en cas de problème.

// ─── DOCUMENTATION ──────────────────────────────────────────────────────────

function mdToHtml(md) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split('\n');
  let html = '', i = 0;
  const inline = t => esc(t)
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" class="doc-img">')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[^"=])(https?:\/\/[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  while (i < lines.length) {
    let l = lines[i];
    if (l.startsWith('```')) {
      let code = []; i++;
      while (i < lines.length && !lines[i].startsWith('```')) { code.push(lines[i]); i++; }
      i++;
      html += `<div class="doc-codeblock"><button class="doc-copy" data-code="${encodeURIComponent(code.join('\n'))}">Copier</button><pre>${esc(code.join('\n'))}</pre></div>`;
      continue;
    }
    if (l.includes('|') && i+1 < lines.length && /^\s*\|?[\s:|-]+\|/.test(lines[i+1])) {
      const head = l.split('|').filter(c=>c.trim()).map(c=>`<th>${inline(c.trim())}</th>`).join('');
      i += 2; let body = '';
      while (i < lines.length && lines[i].includes('|')) {
        const cells = lines[i].split('|').filter(c=>c.trim()).map(c=>`<td>${inline(c.trim())}</td>`).join('');
        body += `<tr>${cells}</tr>`; i++;
      }
      html += `<div class="doc-tablewrap"><table>${head?`<thead><tr>${head}</tr></thead>`:''}<tbody>${body}</tbody></table></div>`;
      continue;
    }
    if (/^#{1,4}\s/.test(l)) { const lvl=l.match(/^#+/)[0].length; html+=`<h${lvl}>${inline(l.replace(/^#+\s/,''))}</h${lvl}>`; i++; continue; }
    if (/^>\s?/.test(l)) {
      let q=[]; while(i<lines.length && /^>\s?/.test(lines[i])){q.push(lines[i].replace(/^>\s?/,''));i++;}
      html+=`<blockquote>${q.map(inline).join('<br>')}</blockquote>`; continue;
    }
    if (/^[-*]\s/.test(l)) {
      let items=[]; while(i<lines.length && /^[-*]\s/.test(lines[i])){items.push(lines[i].replace(/^[-*]\s/,''));i++;}
      html+=`<ul>${items.map(x=>`<li>${inline(x)}</li>`).join('')}</ul>`; continue;
    }
    if (/^\d+\.\s/.test(l)) {
      let items=[]; while(i<lines.length && /^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s/,''));i++;}
      html+=`<ol>${items.map(x=>`<li>${inline(x)}</li>`).join('')}</ol>`; continue;
    }
    if (/^---+$/.test(l)) { html+='<hr>'; i++; continue; }
    if (l.trim()==='') { i++; continue; }
    html += `<p>${inline(l)}</p>`; i++;
  }
  return html;
}

              <div style={{fontWeight:600,fontSize:15,marginBottom:'.25rem'}}>{card.title}</div>
              <div style={{fontSize:12,color:'var(--txt2)',lineHeight:1.5}}>{card.desc}</div>
            </div>
            <div style={{marginTop:'auto'}}>
              {card.active ? (
                card.ctaStyle === 'primary'
                  ? <button className="btn" onClick={card.action} style={{width:'100%',justifyContent:'center'}}>{card.cta}</button>
                  : <button className="btn-ghost" onClick={card.action} style={{width:'100%',justifyContent:'center'}}>{card.cta}</button>
              ) : (
                <span style={{fontSize:11,background:'var(--brd)',color:'var(--txt2)',
                  padding:'3px 10px',borderRadius:20,fontWeight:500}}>Bientôt disponible</span>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Footer settings */}
      <div style={{textAlign:'center'}}>
        <button className="btn-ghost" onClick={onSettings} style={{fontSize:12,padding:'6px 14px'}}>
          ⚙️ Paramètres
        </button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('home'); // 'home' | 'journal' | 'budget'
  const [step,   setStep]   = useState(1);
  const [ss,     setSS]     = useState({1:'active',2:'todo',3:'todo',4:'todo',5:'todo',6:'todo'});
  const [showSettings, setShowSettings] = useState(false);
  const [dateArret,    setDateArret]    = useState('');
  const [rawTxs,       setRawTxs]      = useState([]);
  const [builtRows,    setBuiltRows]   = useState([]);
  const [exportRows,   setExportRows]  = useState([]);
  const [rembos, setRembos] = useState([]);

  const done  = n => setSS(p => ({...p,[n]:'done'}));
  const skip  = n => setSS(p => ({...p,[n]:'skip'}));
  const go    = n => setStep(n);

  const startJournal = () => {
    // Reset funnel state when re-entering
    setStep(1);
    setSS({1:'active',2:'todo',3:'todo',4:'todo',5:'todo',6:'todo'});
    setScreen('journal');
  };

  const h1 = d  => { setDateArret(d); done(1); setStep(2); };
  const h2 = txs => { setRawTxs(txs); done(2); setStep(3); };
  const h3 = result => {
    setBuiltRows(result.rows || []);
    setRembos((result.remboursements||[]).map((r,i)=>({...r, id:r.id||`r${i}`, montant:parseFloat(r.montant)||0})));
    done(3); setStep(4);
  };
  const h3skip = () => { setBuiltRows(buildRows(rawTxs, [])); skip(3); setStep(4); };
  const h4     = rb  => { setRembos(rb); done(4); setStep(5); };
  const h4skip = ()  => { skip(4); setStep(5); };
  const h5     = txs => { setExportRows(txs); done(5); setStep(6); };

  // Home screen
  if (screen === 'home') return (
    <>
      <HomeScreen onJournal={startJournal} onBudget={()=>setScreen('budget')} onDoc={()=>setScreen('doc')} onSettings={() => setShowSettings(true)}/>
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)}/>}
    </>
  );

  // Budget flow
  if (screen === 'budget') return (
    <div className="container">
      <div className="flex-between" style={{marginBottom:'1.5rem'}}>
        <div className="flex" style={{gap:'.75rem',alignItems:'center'}}>
          <button className="btn-ghost" onClick={() => setScreen('home')}
            style={{fontSize:13,padding:'6px 12px'}}>← Accueil</button>
          <div>
            <h1 style={{fontSize:17}}>Construire un budget</h1>
            <div style={{fontSize:11,color:'var(--txt2)',marginTop:1}}>La Maison des JP — Étais-la-Sauvin</div>
          </div>
        </div>
      </div>
      <BudgetFlow onHome={()=>setScreen('home')}/>
    </div>
  );

  // Documentation
  if (screen === 'doc') return <DocScreen onHome={()=>setScreen('home')}/>;

  // Journal funnel
  return (
    <div className="container">
      <div className="flex-between" style={{marginBottom:'1.5rem'}}>
        <div className="flex" style={{gap:'.75rem',alignItems:'center'}}>
          <button className="btn-ghost" onClick={() => setScreen('home')}
            style={{fontSize:13,padding:'6px 12px'}}>← Accueil</button>
          <div>
            <h1 style={{fontSize:17}}>Mise à jour du journal</h1>
            <div style={{fontSize:11,color:'var(--txt2)',marginTop:1}}>La Maison des JP — Étais-la-Sauvin</div>
          </div>
        </div>
        <button className="btn-ghost" onClick={()=>setShowSettings(true)} style={{fontSize:18,padding:'6px 12px'}}>⚙️</button>
      </div>

      <StepNav step={step} ss={ss} onGo={go}/>

      {step===1 && <Step1 onNext={h1}/>}
      {step===2 && <Step2 dateArret={dateArret} onNext={h2}/>}
      {step===3 && <Step3 rawTransactions={rawTxs} onNext={h3} onSkip={h3skip}/>}
      {step===4 && <Step4 remboursements={rembos} rawTxs={rawTxs} onNext={h4} onSkip={h4skip}/>}
      {step===5 && <Step5 transactions={builtRows} matchings={[]} onNext={h5}/>}
      {step===6 && <Step6 transactions={exportRows} onBack={()=>setStep(5)}/>}

      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      const e = this.state.error;
      return (
        <div style={{padding:'2rem',maxWidth:700,margin:'0 auto'}}>
          <div style={{background:'#fce4ec',border:'.5px solid #c62828',borderRadius:10,padding:'1.5rem'}}>
            <h2 style={{color:'#c62828',marginBottom:'1rem'}}>❌ Erreur de rendu</h2>
            <p style={{fontSize:13,marginBottom:'.75rem',color:'#333'}}>{e.toString()}</p>
            <pre style={{fontSize:11,background:'#fff',padding:'1rem',borderRadius:6,
              overflow:'auto',maxHeight:300,color:'#555',lineHeight:1.5}}>
              {e.stack}
            </pre>
            <button onClick={()=>window.location.reload()}
              style={{marginTop:'1rem',padding:'9px 18px',background:'#c62828',color:'#fff',
                border:'none',borderRadius:7,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>
              Recharger l'app
            </button>
          </div>
          <p style={{fontSize:11,color:'#888',marginTop:'1rem'}}>
            Copie ce message et envoie-le pour débogage.
          </p>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
