const CAT1_LIST = Object.keys(TAXONOMY);
const getCat2List = (c1) => c1 ? Object.keys(TAXONOMY[c1]?.cat2 || {}) : [];
const getCat3List = (c1, c2) => c1 && c2 ? (TAXONOMY[c1]?.cat2?.[c2] || []) : [];

// ─── ASSOCIÉS ─────────────────────────────────────────────────────────────────

const ASSOCIES = {
  'Machi': { nom:'Maxime Foltier',   aliases:['FOLTIER','MAXIME FOLTIER','MACHI',' MAX ','MAX FOLTIER'] },
  'Alex':  { nom:'Alexis Challande', aliases:['CHALLANDE','ALEXIS CHALLANDE','ALEXIS','ALEX '] },
  'Rac':   { nom:'Raphaël Benizio',  aliases:['BENIZIO','RAPHAEL BENIZIO','M BENIZIO','RAPHAËL','RAPHAEL',' RAC ','RAC ','RAPH '] },

  'Saum':  { nom:'Simon Goutal',     aliases:['GOUTAL','SIMON GOUTAL','MR GOUTAL',' SAUM ','SAUM ','SAUMON'] },
};

// ─── AUTO-CATÉGORISATION ─────────────────────────────────────────────────────
// Rules faithfully reproduced from validated v10 session

function autoCatRow(row) {
  const lib   = (row.libelle       || '').toUpperCase();
  const cont  = (row.contrepartie  || '').toUpperCase();
  const type  = (row.type          || '').toUpperCase();
  const txt   = lib + ' ' + cont;
  const amt   = row.montant || 0;

  // ── FLUX ASSOCIÉS ────────────────────────────────────────────────────────
  if (amt > 0) {
    const EXCL = ['RBST','REMBOURSEMENT','PARTICIPATION','JPP','PIANO',
                  'PETANQUE','PÉTANQUE','ACHAT','FACTURE','CONTRIBUTION','AVOIR'];
    if (!EXCL.some(k => txt.includes(k))) {
      const contWords = [cont.trim()];
      for (const [pseudo, info] of Object.entries(ASSOCIES)) {
        const kws = info.aliases;
        if (kws.some(k => (' ' + txt + ' ').includes(' ' + k.trim() + ' ')) ||
            contWords.some(w => kws.some(k => w === k.trim().replace(/ /g,'')))) {
          let cat2, source;
          if (Math.round(amt) === 200) {
            cat2 = "Apports périodiques"; source = 'auto';
          } else if (amt > 2000) {
            cat2 = "Avances d'associés (CCA)"; source = 'partial';
          } else {
            cat2 = ""; source = 'partial';
          }
          return { cat1:"Flux financiers associés", cat2, cat3:pseudo, source };
        }
      }
    }
  }

  // ── FRAIS SHINE ──────────────────────────────────────────────────────────
  if (type === 'COMMISSION' || cont === 'SHINE' || cont.includes('SHINE')) {
    return { cat1:"Charges et frais courants", cat2:"Administratif et abonnements",
             cat3:"Frais bancaires", source:'auto', shinePrefix:true };
  }

  // ── EDF / ENEDIS ─────────────────────────────────────────────────────────
  if (cont.includes('EDF') || cont.includes('ENEDIS')) {
    return { cat1:"Charges et frais courants", cat2:"Consommables",
             cat3:"EDF - Electricité", source:'auto' };
  }

  // ── ORANGE / LIVEBOX ─────────────────────────────────────────────────────
  if (cont.includes('ORANGE') || lib.includes('LIVEBOX')) {
    return { cat1:"Charges et frais courants", cat2:"Administratif et abonnements",
             cat3:"Internet", source:'auto' };
  }

  // ── SGC AUXERRE / DÉCHETTERIE ────────────────────────────────────────────
  if (cont.includes('SGC') || lib.includes('RAMASSAGE ORDURES') || lib.includes('DECHETS')) {
    return { cat1:"Charges et frais courants", cat2:"Taxes et impôts",
             cat3:"Déchetterie & Ramassage des ordures", source:'auto' };
  }

  // ── EAU / ASSAINISSEMENT ─────────────────────────────────────────────────
  if (txt.includes('EAU ET ASSAINISSEMENT') || cont.includes('TRESORERIE AUXERRE') ||
      cont.includes('TRÉSORERIE AUXERRE') ||
      (cont.includes('TRESORERIE') && lib.includes('ASSAINISSEMENT'))) {
    return { cat1:"Charges et frais courants", cat2:"Taxes et impôts",
             cat3:"Eau et assainissement", source:'auto' };
  }

  // ── DGFIP / IMPÔTS ───────────────────────────────────────────────────────
  if (cont.includes('DGFIP') || cont.includes('DIRECTION GENERALE DES FINANCES') ||
      cont.includes('DIRECTION GÉNÉRALE DES FINANCES')) {
    if (lib.includes('FONCI') || lib.includes('IMPOT TF') || lib.includes('IMPÔT TF')) {
      return { cat1:"Charges et frais courants", cat2:"Taxes et impôts",
               cat3:"Taxe foncière", source:'auto' };
    }
    if (lib.includes('HABITATION') || lib.includes('IMPOT TH') || lib.includes('IMPÔT TH')) {
      return { cat1:"Charges et frais courants", cat2:"Taxes et impôts",
               cat3:"Taxe d'habitation", source:'auto' };
    }
    return null; // Other DGFIP → À catégoriser
  }

  // ── ASSURANCES ───────────────────────────────────────────────────────────
  if (cont.includes('AXA') || cont.includes('ALLIANZ')) {
    return { cat1:"Charges et frais courants", cat2:"Assurances",
             cat3:"Assurance habitation", source:'auto' };
  }
  if (cont.includes('MAIF') || cont.includes('LOLIVIER') || cont.includes('OLIVIER ASSURANCE')) {
    return { cat1:"Charges et frais courants", cat2:"Assurances",
             cat3:"Assurance du véhicule", source:'auto' };
  }

  // ── PÉAGES ───────────────────────────────────────────────────────────────
  const TOLLS = ['APRR','SANEF','FULLI','CEREA','VINCI AUTOROUTE','AREA '];
  if (TOLLS.some(k => cont.includes(k) || lib.includes(k))) {
    return { cat1:"Charges et frais courants", cat2:"Consommables",
             cat3:"Péage et essence du véhicule", source:'auto' };
  }

  // ── TRAVAUX / QUINCAILLERIE (CAT1 uniquement) ───────────────────────────
  const BRICO = ['LEROY MERLIN','ADEO*LEROY','BRICOMARCHE','BRICOMARCHÉ','BRICORAMA'];
  if (BRICO.some(k => txt.includes(k))) {
    return { cat1:"Travaux et investissements", cat2:"", cat3:"", source:'partial' };
  }
  if (txt.includes('AMAZON') && amt < 0) {
    return { cat1:"Travaux et investissements", cat2:"", cat3:"", source:'partial' };
  }

  return null;
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────

const parseFrAmt = s => parseFloat((s||'').trim().replace(/\s/g,'').replace(',','.')) || 0;

function formatDateFR(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  if (!y || !m || !d) return iso;
  return `${d}/${m}/${y}`;
}

function isoToDate(iso) {
  if (!iso) return null;
  return new Date(iso + 'T00:00:00');
}

function todayISO() {
  return new Date().toISOString().slice(0,10);
}

// ─── GVIZ AUTO-FETCH ─────────────────────────────────────────────────────────

// Parse a gviz cell value to ISO date string
function parseGvizCell(cell) {
  if (!cell || cell.v == null) return null;
  const f = cell.f;
  if (f) {
    const dm = f.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (dm) return `${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
    const dm2 = f.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (dm2) return f.slice(0,10);
  }
  const v = String(cell.v);
  const dv = v.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dv) {
    return `${dv[1]}-${String(parseInt(dv[2])+1).padStart(2,'0')}-${dv[3].padStart(2,'0')}`;
  }
  const dv2 = v.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (dv2) return `${dv2[3]}-${dv2[2].padStart(2,'0')}-${dv2[1].padStart(2,'0')}`;
  return null;
}

function parseGvizRows(rows) {
  if (!rows?.length) return null;
  for (let i = rows.length - 1; i >= 0; i--) {
    const d = parseGvizCell(rows[i]?.c?.[0]);
    if (d) return d;
  }
  return null;
}

async function fetchLastDateFromGSheet() {
  // ── Méthode 1 : JSONP via <script> — fonctionne depuis file:// ──────────────
  const jsonpResult = await new Promise((resolve) => {
    const cbName = 'gviz_' + Math.random().toString(36).slice(2);
    const script  = document.createElement('script');
    let settled   = false;

    const done = (val) => {
      if (settled) return; settled = true;
      clearTimeout(timer);
      delete window[cbName];
      try { script.parentNode?.removeChild(script); } catch {}
      resolve(val);
    };

    window[cbName] = (resp) => {
      try { done(parseGvizRows(resp?.table?.rows)); }
      catch { done(null); }
    };

    const timer = setTimeout(() => done(null), 7000);
    script.onerror = () => done(null);
    // gviz responseHandler = JSONP callback name
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=Journal&range=A:A`;
    document.head.appendChild(script);
  });

  if (jsonpResult) return jsonpResult;

  // ── Méthode 2 : fetch classique — fonctionne depuis http:// ─────────────────
  try {
    const resp = await fetch(
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Journal&range=A:A`,
      { cache: 'no-store' }
    );
    if (!resp.ok) return null;
    const text = await resp.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!m) return null;
    const data = JSON.parse(m[1]);
    return parseGvizRows(data?.table?.rows);
  } catch { return null; }
}

const SHEET_TABS = {
  achatsInitiaux: 'Achats initiaux',
  charges:        'Charges',
  suiviTravaux:   'Suivi budget travaux',
  historisation:  'Historisation budgets',

// Normalise un label pour matching (retire émojis, espaces multiples, casse)
function normLabel(s) {
  if (!s) return '';
  return String(s)
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, '')
    .replace(/\s+/g, ' ').trim().toLowerCase();
}

// Parse un nombre depuis une cellule gviz ("-67 959,32 €" → -67959.32)
function parseGvizNumber(cell) {
  if (!cell) return null;
  if (typeof cell.v === 'number') return cell.v;
  if (cell.v == null) return null;
  const s = String(cell.f || cell.v).replace(/[€\s\u00A0]/g, '').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// Fetch générique gviz d'une plage par NOM de feuille, retourne {rows, cols}
async function fetchGvizRange(sheetName, range) {
  const enc = encodeURIComponent(sheetName);
  const jsonp = await new Promise((resolve) => {
    const cbName = 'gviz_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    let settled = false;
    const done = (val) => {
      if (settled) return; settled = true;
      clearTimeout(timer); delete window[cbName];
      try { script.parentNode?.removeChild(script); } catch {}
      resolve(val);
    };
    window[cbName] = (resp) => {
      try { done(resp?.table ? { rows: resp.table.rows||[], cols: resp.table.cols||[] } : null); }
      catch { done(null); }
    };
    const timer = setTimeout(() => done(null), 10000);
    script.onerror = () => done(null);
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=${enc}&range=${range}`;
    document.head.appendChild(script);
  });
  if (jsonp) return jsonp;
  try {
    const resp = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${enc}&range=${range}`, { cache:'no-store' });
    if (!resp.ok) return null;
    const text = await resp.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!m) return null;
    const t = JSON.parse(m[1])?.table;
    return t ? { rows: t.rows||[], cols: t.cols||[] } : null;
  } catch { return null; }
}

// Projection des charges sur 11 ans (2022→2032 inclus)
function computeChargesProjection(annualTotals, inflationRate, todayISO) {
  const years = Object.keys(annualTotals).map(Number).sort((a,b)=>a-b);
  if (!years.length) return null;
  const firstYear = years[0];
  const today = new Date(todayISO);
  const curYear = today.getFullYear();

  const pastYears = years.filter(y => y < curYear);
  const realPast = pastYears.reduce((s,y)=>s+Math.abs(annualTotals[y]||0), 0);

  const fullYears = years.filter(y => y !== firstYear && y < curYear);
  const avgFullYear = fullYears.length
    ? fullYears.reduce((s,y)=>s+Math.abs(annualTotals[y]||0),0) / fullYears.length : 0;

  const endYear = firstYear + 10;
  const i = inflationRate / 100;
  const endOfYear = new Date(curYear, 11, 31);
  const startOfYear = new Date(curYear, 0, 1);
  const fracRemaining = (endOfYear - today) / (endOfYear - startOfYear);
  const lastFullYear = fullYears.length ? fullYears[fullYears.length-1] : firstYear;

  const detail = [];
  let projected = 0;
  for (let y = curYear; y <= endYear; y++) {
    let amount = avgFullYear * Math.pow(1+i, y - lastFullYear);
    if (y === curYear) amount *= fracRemaining;
    projected += amount;
    detail.push({ year:y, amount:Math.round(amount), prorata: y===curYear ? fracRemaining : 1 });
  }

  return {
    realPast: Math.round(realPast),
    avgFullYear: Math.round(avgFullYear),
    fullYears, pastYears,
    projected: Math.round(projected),
    total: Math.round(realPast + projected),
    detail, horizon: [firstYear, endYear],
  };
}

// Back-calcul du taux d'inflation pour atteindre un total cible (dichotomie)
function solveInflationForTotal(annualTotals, targetTotal, todayISO) {
  let lo = -20, hi = 50;
  for (let iter = 0; iter < 60; iter++) {
    const mid = (lo + hi) / 2;
    const t = computeChargesProjection(annualTotals, mid, todayISO)?.total ?? 0;
    if (Math.abs(t - targetTotal) < 1) return Math.round(mid*100)/100;
    if (t < targetTotal) lo = mid; else hi = mid;
  }
  return Math.round(((lo+hi)/2)*100)/100;
}

// Charge toutes les données budget en parallèle
async function fetchBudgetData() {
  const results = await Promise.allSettled([
    fetchGvizRange(SHEET_TABS.achatsInitiaux, 'C13'),
    fetchGvizRange(SHEET_TABS.charges, 'C34:H35'),
    fetchGvizRange(SHEET_TABS.suiviTravaux, 'B5:C78'),
    fetchGvizRange(SHEET_TABS.historisation, 'B1:CE2'),
    fetchGvizRange(SHEET_TABS.historisation, 'A3:CE79'),
  ]);
  const vals = results.map(r => r.status === 'fulfilled' ? r.value : null);
  const achatsRows    = vals[0]?.rows;
  const chargesRows   = vals[1]?.rows;   const chargesCols = vals[1]?.cols;
  const suiviRows     = vals[2]?.rows;
  const histHeaderRows= vals[3]?.rows;   const histHeaderCols = vals[3]?.cols;
  const histDataRows  = vals[4]?.rows;

  const labels = ['Achats initiaux', 'Charges', 'Suivi travaux', 'Historisation (entêtes)', 'Historisation (détail)'];
  const failed = vals.map((v,i) => (!v || !v.rows) ? labels[i] : null).filter(Boolean);
  if (failed.length) console.warn('Budget fetch — onglets sans données :', failed.join(', '));

  // 1. Achats initiaux (C13)
  const achatsInitiaux = Math.abs(parseGvizNumber(achatsRows?.[0]?.c?.[0]) || 0);

  // 2. Totaux annuels charges. gviz peut interpréter la 1ère ligne comme en-tête :
  //    on lit donc les années depuis table.cols (label) ET depuis les rows en fallback.
  const annualTotals = {};
  if (chargesRows?.length) {
    // Cas A : 2 lignes (années + montants)
    if (chargesRows.length >= 2) {
      const yearRow = chargesRows[0].c;
      const valRow  = chargesRows[1].c;
      for (let j = 1; j < yearRow.length; j++) {
        const year = parseInt(parseGvizNumber(yearRow[j]));
        const val  = parseGvizNumber(valRow[j]);
        if (year && val != null) annualTotals[year] = val;
      }
    }
    // Cas B : 1 seule ligne (gviz a pris les années comme en-tête → chargesCols)
    if (!Object.keys(annualTotals).length && chargesCols?.length) {
      const valRow = chargesRows[chargesRows.length - 1].c;
      for (let j = 1; j < chargesCols.length; j++) {
        const year = parseInt(String(chargesCols[j]?.label || '').replace(/\D/g,''));
        const val  = parseGvizNumber(valRow[j]);
        if (year >= 2020 && year <= 2040 && val != null) annualTotals[year] = val;
      }
    }
  }

  // 3. Détection du dernier budget (ligne 1 de l'historisation)
  let lastBudgetColIdx = -1, lastBudgetName = '';
  const headerRow1 = histHeaderRows?.[0]?.c || [];
  for (let j = headerRow1.length - 1; j >= 0; j--) {
    const v = headerRow1[j]?.v;
    if (v && String(v).trim()) { lastBudgetColIdx = j; lastBudgetName = String(v).trim(); break; }
  }

  // 4. Lignes de l'historisation (A3:CE79). col A=0=label, montant = lastBudgetColIdx+1
  let montantCol = lastBudgetColIdx + 1;

  // Validation : la ligne apports doit avoir un montant > 0 à montantCol.
  // Si non (décalage gviz, cellules omises…), on cherche la dernière colonne
  // non vide de la ligne apports comme colonne montant de secours.
  const apportsRowProbe = (histDataRows || []).find(r => /apports associes/i.test(normLabel(r.c?.[0]?.v)));
  if (apportsRowProbe) {
    const atCol = parseGvizNumber(apportsRowProbe.c?.[montantCol]);
    if (!atCol) {
      // chercher la dernière cellule numérique > 0 de la ligne apports
      for (let j = apportsRowProbe.c.length - 1; j >= 1; j--) {
        const v = parseGvizNumber(apportsRowProbe.c[j]);
        if (v && Math.abs(v) > 0) { montantCol = j; break; }
      }
    }
  }

  const lastBudget = {};
  const lastBudgetOrder = [];
  const structural = {};
  (histDataRows || []).forEach((row) => {
    const label = row.c?.[0]?.v;
    if (!label) return;
    const montant = Math.abs(parseGvizNumber(row.c?.[montantCol]) || 0);
    const nl = normLabel(label);
    const entry = { label: String(label).trim(), montant };
    lastBudget[nl] = entry;
    lastBudgetOrder.push(entry);
    if (/apports associes/i.test(nl)) structural.apports = montant;
    else if (/achats et frais initiaux/i.test(nl)) structural.achatsHist = montant;
    else if (/charges et frais courants/i.test(nl)) structural.charges = montant;
    else if (/budget estimatif a rep[ae]rtir/i.test(nl)) structural.budgetEstimatif = montant;
  });

  // 5. Réel consommé (Suivi budget travaux B5:C78)
  const realByLabel = {};
  (suiviRows || []).forEach((row) => {
    const label = row.c?.[0]?.v;
    if (!label) return;
    const real = Math.abs(parseGvizNumber(row.c?.[1]) || 0);
    realByLabel[normLabel(label)] = real;
  });

  return {
    ok: failed.length === 0,
    failed,
    debug: {
      achatsRowsLen: achatsRows?.length ?? 'null',
      chargesRowsLen: chargesRows?.length ?? 'null',
      suiviRowsLen: suiviRows?.length ?? 'null',
      histHeaderLen: histHeaderRows?.length ?? 'null',
      histDataLen: histDataRows?.length ?? 'null',
      annualYears: Object.keys(annualTotals),
      budgetLines: lastBudgetOrder.length,
      lastBudgetName, lastBudgetColIdx,
      structural: { apports: structural.apports, achats: structural.achatsHist, charges: structural.charges, budgetEstim: structural.budgetEstimatif },
    },
    achatsInitiaux: achatsInitiaux || structural.achatsHist || 0,
    annualTotals,
    apports: structural.apports || 0,
    lastChargesEstimate: structural.charges || 0,
    lastBudgetName, lastBudgetColIdx,
    lastBudget, lastBudgetOrder, realByLabel,
    structural,
  };
}

// ─── CSV PARSING ──────────────────────────────────────────────────────────────

function parseShineCSV(text) {
  const result = Papa.parse(text.trim(), { delimiter:';', header:true, skipEmptyLines:true });
  if (!result.data?.length) throw new Error('CSV vide ou mal formaté');

  const hdr = result.meta.fields || [];
  const col = (...pats) => {
    for (const p of pats) {
      const pl = p.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
      const h = hdr.find(h => {
        const hl = h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
        return hl.includes(pl);
      });
      if (h) return h;
    }
    return null;
  };

  const dateCol  = col('Date de la valeur','datevaleur') || col("Date d'opération",'dateoperation','date');
  const libCol   = col('Libellé','libelle','label','description','reference');
  const contCol  = col('Nom de la contrepartie','contrepartie','beneficiaire','tiers','nomcontrepartie');
  const debitCol = col('Débit','debit');
  const creditCol= col('Crédit','credit');
  const typeCol  = col('Type de transaction','type');

  if (!dateCol) throw new Error('Colonne date introuvable. Headers: ' + hdr.join(', '));

  return result.data.map((row, idx) => {
    const dateRaw = (row[dateCol] || '').trim();
    let dateISO = '';
    const dm = dateRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (dm) dateISO = `${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
    else if (/^\d{4}-\d{2}-\d{2}/.test(dateRaw)) dateISO = dateRaw.slice(0,10);

    const debit  = parseFrAmt(debitCol  ? row[debitCol]  : '0');
    const credit = parseFrAmt(creditCol ? row[creditCol] : '0');
    const montant = credit > 0 ? credit : -debit;

    const libBrut = libCol  ? (row[libCol]  || '').trim() : '';
    const contRaw = contCol ? (row[contCol] || '').trim() : '';

    return {
      id:           `row-${idx}`,
      date:         dateISO,
      libelle:      libBrut,
      libelleBrut:  libBrut,
      contrepartie: contRaw,
      montant,
      type:         typeCol ? (row[typeCol] || '').trim() : '',
      cat1:'', cat2:'', cat3:'',
      nFacture:'', commentaire:'',
      source:'manual',
      iaSuggestion:null,
      shinePrefix:false,
      ventilations:null,
    };
  });
}

function buildRows(txs, matchings = []) {
  const matchMap = {};
  (matchings || []).forEach(m => { matchMap[m.transactionId] = m; });
  return txs.map(t => {
    const cat = autoCatRow(t);
    const ai  = matchMap[t.id];
    let row = { ...t };
    if (cat) {
      row = { ...row, cat1:cat.cat1||'', cat2:cat.cat2||'', cat3:cat.cat3||'',
               source:cat.source||'auto', shinePrefix:cat.shinePrefix||false };
      if (cat.shinePrefix) row.libelle = `Shine — ${t.libelleBrut}`;
    } else if (ai && !row.cat1) {
      row = { ...row, cat1:ai.cat1||'', cat2:ai.cat2||'', cat3:ai.cat3||'',
               source:'ia', iaSuggestion:ai.contexte||null };
    }
    return row;
  });
}

// Section of a row: auto | partial | manual
function getSection(row) {
  if (!row.cat1) return 'manual';
  const c3opts = getCat3List(row.cat1, row.cat2);
  if (!row.cat2 || (c3opts.length > 0 && !row.cat3)) return 'partial';
  return 'auto';
}
// Classification pour la révision — valide chaque niveau contre la taxonomie réelle
function getRevSection(row) {
  // Ventilé = complet
  if (row.ventilations && row.ventilations.length > 0) return row.source === 'ia' ? 'ia' : 'auto';
  // CAT1 doit être une entrée valide
  if (!row.cat1 || !CAT1_LIST.includes(row.cat1)) return 'manual';
  // CAT2 doit être valide dans cette CAT1
  const c2list = getCat2List(row.cat1);
  if (!row.cat2 || !c2list.includes(row.cat2)) return 'manual';
  // CAT3 : si des options existent, l'une doit être sélectionnée et valide
  const c3list = getCat3List(row.cat1, row.cat2);
  if (c3list.length > 0 && (!row.cat3 || !c3list.includes(row.cat3))) return 'manual';
  return row.source === 'ia' ? 'ia' : 'auto';
}

// Sort: positives first, then negatives, chronological within
function sortRows(arr) {
  return [
    ...arr.filter(r => r.montant >= 0).sort((a,b) => a.date.localeCompare(b.date)),
    ...arr.filter(r => r.montant <  0).sort((a,b) => a.date.localeCompare(b.date)),
  ];
}

async function callClaude(apiKey, messages, system = '', maxTokens = 2000) {

      'anthropic-version':'2023-06-01',

// ─── PASSE A : appliquer les matchings IA explicites ─────────────────────────

function applyPasseA(rows, matchings) {
  const mm = {};
  // Guard: matchings must be an array
  const list = Array.isArray(matchings) ? matchings : [];
  list.forEach(m => {
    if (m && m.transactionId) mm[String(m.transactionId)] = m;
  });
  return rows.map(row => {
    const match = mm[String(row.id)];
    if (!match) return row;
    // ── Protéger les lignes déjà parfaitement catégorisées par les règles auto ──
    if (row.source === 'auto' && getSection(row) === 'auto') return row;
    const vents = Array.isArray(match.ventilations) ? match.ventilations : [];
    if (!vents.length) return row;
    // Coerce all IA-provided strings to ensure no object ends up in JSX
    const str = v => (v == null || typeof v === 'object') ? '' : String(v);
    const pct0 = Number(vents[0].pct);
    if (vents.length === 1 && (isNaN(pct0) || pct0 >= 95)) {
      // Catégorisation unique
      return { ...row,
        cat1:'Travaux et investissements',
        cat2: str(vents[0].cat2),
        cat3: str(vents[0].cat3),
        libelle: str(vents[0].libelle) || row.libelle,
        source:'ia', iaSuggestion: str(match.contexte), ventilations:null };
    }
    // Ventilation multi-lignes
    const appVents = vents.map(v => ({
      montant: parseFloat((Math.abs(row.montant) * (Number(v.pct)||0) / 100).toFixed(2)) * (row.montant<0?-1:1),
      libelle: str(v.libelle) || row.libelle,
      cat1:'Travaux et investissements', cat2: str(v.cat2), cat3: str(v.cat3),
    }));
    // Correction arrondi sur dernière ligne
    const diff = parseFloat((row.montant - appVents.reduce((s,v)=>s+v.montant,0)).toFixed(2));
    if (Math.abs(diff) > 0.004 && appVents.length)
      appVents[appVents.length-1].montant = parseFloat((appVents[appVents.length-1].montant + diff).toFixed(2));
    return { ...row, source:'ia', ventilations:appVents, iaSuggestion: str(match.contexte) };
  });
}

// ─── PASSE B : ventilation automatique des lignes "partial" ──────────────────

function applyPasseB(rows, chantiers) {
  if (!chantiers || !chantiers.length) return rows;
  return rows.map(row => {
    // Seulement les lignes partielles non encore traitées par l'IA
    if (getSection(row) !== 'partial' || row.source === 'ia') return row;
    if (chantiers.length === 1) {
      return { ...row,
        cat2:chantiers[0].cat2, cat3:chantiers[0].cat3,
        source:'ia',
        iaSuggestion:`Ventilé auto : ${chantiers[0].cat2}${chantiers[0].cat3?' › '+chantiers[0].cat3:''}` };
    }
    const appVents = chantiers.map(c => ({
      montant: parseFloat((Math.abs(row.montant) * c.pct / 100).toFixed(2)) * (row.montant<0?-1:1),
      libelle: row.libelle,
      cat1:'Travaux et investissements', cat2:c.cat2, cat3:c.cat3,
    }));
    const diff = parseFloat((row.montant - appVents.reduce((s,v)=>s+v.montant,0)).toFixed(2));
    if (Math.abs(diff) > 0.004 && appVents.length) appVents[appVents.length-1].montant = parseFloat((appVents[appVents.length-1].montant + diff).toFixed(2));
    return { ...row, source:'ia', ventilations:appVents, iaSuggestion:'Ventilé selon les chantiers en cours' };
  });
}

// ─── STEP NAV ─────────────────────────────────────────────────────────────────

const STEPS = [{n:1,e:'📅',l:'Date'},{n:2,e:'📥',l:'CSV'},{n:3,e:'💬',l:'Contexte'},
               {n:4,e:'💸',l:'Rembt.'},{n:5,e:'✏️',l:'Révision'},{n:6,e:'🚀',l:'Export'}];

function StepNav({ step, ss, onGo }) {

// ─── STEP 2: IMPORT CSV ───────────────────────────────────────────────────────

function Step2({ dateArret, onNext }) {
  const [drag, setDrag]   = useState(false);
  const [err,  setErr]    = useState('');
  const [rows, setRows]   = useState(null);
  const fileRef = useRef();

  const process = file => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        let parsed = parseShineCSV(e.target.result);
        const cutoff = isoToDate(dateArret);
        parsed = parsed.filter(r => { const d=isoToDate(r.date); return d && d > cutoff; });
        if (!parsed.length) { setErr(`Aucune transaction après le ${formatDateFR(dateArret)}.`); setRows(null); return; }
        setErr(''); setRows(parsed);
      } catch(ex) { setErr('Erreur : ' + ex.message); setRows(null); }
    };
    reader.readAsText(file, 'UTF-8');
  };

  const autoCount = rows ? buildRows(rows).filter(r => r.source==='auto').length : 0;

  return (
    <div className="card">
      <h2>📥 Import CSV Shine</h2>
      <p style={{color:'var(--txt2)',fontSize:13}}>Transactions après le <strong>{formatDateFR(dateArret)}</strong>.
        Export Shine → Relevé → CSV (séparateur <code>;</code>).</p>
      <div className={`upload-zone ${drag?'drag':''}`}
        onDragOver={e=>{e.preventDefault();setDrag(true)}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0])}}
        onClick={()=>fileRef.current.click()} style={{marginBottom:'1rem'}}>
        <div style={{fontSize:32,marginBottom:8}}>📂</div>
        <div style={{fontWeight:500}}>Glisser le CSV Shine ici</div>
        <div style={{fontSize:12,color:'var(--txt2)',marginTop:4}}>ou cliquer — fichier .csv séparateur ;</div>
        <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>process(e.target.files[0])}/>
      </div>
      {err && <div className="notice notice-rd">⚠️ {err}</div>}
      {rows && (
        <>
          <div className="notice notice-gr">
            ✓ <strong>{rows.length}</strong> transactions • {autoCount} auto-catégorisées
          </div>
          <button className="btn-green" onClick={() => onNext(rows)}>
            Continuer avec {rows.length} transactions →
          </button>
        </>
      )}
    </div>
  );
}

function ChantierModal({ onValidate, onClose }) {
  const [lines, setLines] = useState([

  ]);

  const total  = lines.reduce((s,l) => s + (parseInt(l.pct)||0), 0);
  const isOK   = total === 100;

  const updCat = (i, key) => {
    const opt = TRAVAUX_OPTS.find(o => o.key === key);
    if (!opt) return;
    setLines(p => p.map((l,j) => j===i ? {...l, cat2:opt.cat2, cat3:opt.cat3} : l));
  };

  const updPct = (i, v) => setLines(p => p.map((l,j) => j===i ? {...l, pct:parseInt(v)||0} : l));

  const add = () => {
    if (lines.length >= 4) return;
    setLines(p => [...p, {cat2:'', cat3:'', pct:0}]);
  };

  const normalize = () => {
    if (total === 0) return;
    const newL = lines.map((l,i) => ({
      ...l, pct: i < lines.length-1 ? Math.round((parseInt(l.pct)||0)*100/total) : 0
    }));

    setLines(newL);

  return (

                style={{width:60,padding:'7px 6px',border:'.5px solid var(--brd2)',borderRadius:7,

// ─── STEP 4: REMBOURSEMENTS ───────────────────────────────────────────────────

// Libellé du virement groupé (max 60 chars)
function buildGroupLibelle(g) {
  if (g.items.length === 1) return g.items[0].libelleSuggere || `rbst ${g.associe} - ${g.items[0].motif}`;
  const motifs = g.items.map(i => i.motif).join(' + ');
  const cand = `rbst ${g.associe} - ${motifs}`;
  if (cand.length <= 60) return cand;
  const dates = g.items.map(i => i.date).filter(Boolean).sort();
  const last  = dates[dates.length - 1];
  const mRef  = last ? new Date(last).toLocaleDateString('fr-FR', {month:'short', year:'2-digit'}) : '';
  return `rbst ${g.associe} - ${g.items.length} avances${mRef?' '+mRef:''}`.slice(0, 60);
}

// Date butoir = date du dernier virement sortant "rbst" dans le CSV courant
function findDateButoir(rawTxs) {
  const rbstTxs = (rawTxs || []).filter(tx =>
    tx.montant < 0 && /rbst/i.test((tx.libelle || '') + ' ' + (tx.contrepartie || ''))
  );
  if (!rbstTxs.length) return null;
  return rbstTxs.reduce((max, tx) => tx.date > max ? tx.date : max, rbstTxs[0].date);
}

function Step4({ remboursements: rin, rawTxs, onNext, onSkip }) {
  // ── 1. Date butoir : dernier "rbst" sortant dans le CSV ─────────────────────
  const dateButoirISO = useMemo(() => findDateButoir(rawTxs), [rawTxs]);

  // ── 2. Filtrer : garder uniquement les demandes après la date butoir ─────────
  const rinFiltered = useMemo(() => {
    if (!dateButoirISO) return rin;                           // pas de butoir → tout afficher
    return rin.filter(r => !r.date || r.date > dateButoirISO);
  }, [rin, dateButoirISO]);

  // ── 3. Grouper par associé → 1 virement par personne ────────────────────────
  const groups = useMemo(() => {
    const g = {};
    rinFiltered.forEach(r => {
      if (!g[r.associe]) g[r.associe] = { associe: r.associe, items: [], total: 0 };
      g[r.associe].items.push(r);
      g[r.associe].total += parseFloat(r.montant) || 0;
    });
    return Object.values(g).map(gr => ({
      ...gr,
      total: parseFloat(gr.total.toFixed(2)),
      libelleSuggere: buildGroupLibelle(gr),
    }));
  }, [rinFiltered]);

  const [checked,  setChecked]  = useState({});
  const [expanded, setExpanded] = useState({});
  const [showRIB,  setShowRIB]  = useState({});

  const excluded   = rin.length - rinFiltered.length;
  const doneCount  = groups.filter(g => !!checked[g.associe]).length;
  const allDone    = groups.length > 0 && doneCount === groups.length;

  if (!rin.length) return (
    <div className="card card-sm">
      <h2>💸 Remboursements</h2>
      <div className="notice notice-gr">✓ Aucun remboursement détecté dans la conversation.</div>
      <button className="btn-green" onClick={() => onNext([])}>Continuer →</button>
    </div>
  );

  if (!groups.length) return (
    <div className="card card-sm">
      <h2>💸 Remboursements</h2>
      {dateButoirISO && (
        <div className="notice notice-gr mb-2">
          ✓ Tous les remboursements détectés ({rin.length}) sont antérieurs au dernier rbst effectué le <strong>{formatDateFR(dateButoirISO)}</strong> — rien à faire.
        </div>
      )}
      <button className="btn-green" onClick={() => onNext([])}>Continuer →</button>
    </div>
  );

  return (
    <div className="card">
      <div className="flex-between mb-2">
        <div>
          <h2 style={{marginBottom:2}}>💸 Remboursements — 1 virement par associé</h2>
          <div style={{fontSize:12,color:'var(--txt2)'}}>{doneCount}/{groups.length} virements effectués</div>
        </div>
        <button className="btn-ghost" onClick={onSkip}>Passer →</button>
      </div>

      {/* Info date butoir */}
      {dateButoirISO ? (
        <div className="notice notice-ia mb-2" style={{fontSize:12}}>
          📅 Date butoir : <strong>{formatDateFR(dateButoirISO)}</strong> (dernier rbst dans le CSV)
          {excluded > 0 && ` — ${excluded} demande(s) antérieure(s) exclue(s)`}
        </div>
      ) : (
        <div className="notice mb-2" style={{fontSize:12,color:'var(--txt2)'}}>
          ℹ️ Aucun virement "rbst" trouvé dans le CSV — toutes les demandes sont affichées.
        </div>
      )}

      {/* Liste des virements */}
      <div style={{display:'flex',flexDirection:'column',gap:'.6rem',marginBottom:'1.2rem'}}>
        {groups.map(g => {
          const isDone     = !!checked[g.associe];
          const isSaum     = g.associe === 'Saum';
          const isExpanded = !!expanded[g.associe];
          return (
            <div key={g.associe} style={{
              border:`.5px solid ${isDone?'#2e7d32':'var(--brd)'}`,
              borderRadius:8, padding:'12px 14px',
              background:isDone?'var(--gr-bg)':'var(--bg)', transition:'.15s',
            }}>
              <div className="flex" style={{alignItems:'flex-start',gap:10}}>
                <input type="checkbox" checked={isDone}
                  onChange={e => setChecked(p => ({...p,[g.associe]:e.target.checked}))}

                <div style={{flex:1}}>

// ─── VENTILATION MODAL ────────────────────────────────────────────────────────

function VentModal({ row, onSave, onClose, onCancelVent }) {
  const total = row.montant;
  // Initialiser avec les ventilations existantes (passe B ou manuelle) si dispo
  const [lines, setLines] = useState(() => {
    if (row.ventilations && row.ventilations.length >= 2) {
      return row.ventilations.map(v => ({
        montant: v.montant,
        libelle: v.libelle || row.libelle,
        cat1: v.cat1 || row.cat1 || 'Travaux et investissements',
        cat2: v.cat2 || '',
        cat3: v.cat3 || '',
      }));
    }
    const half = parseFloat((total/2).toFixed(2));
    return [
      {montant:half, libelle:row.libelle, cat1:row.cat1||'', cat2:row.cat2||'', cat3:row.cat3||''},
      {montant:parseFloat((total-half).toFixed(2)), libelle:row.libelle, cat1:row.cat1||'', cat2:row.cat2||'', cat3:row.cat3||''},
    ];
  });

  const sum = lines.reduce((s,l) => s + (parseFloat(l.montant)||0), 0);
  const isOK = Math.abs(sum - total) < 0.005;

  const upd = (i, field, val) => setLines(p => {
    const a = [...p];
    a[i] = {...a[i], [field]:val};
    if (field==='cat1') { a[i].cat2=''; a[i].cat3=''; }
    if (field==='cat2') { a[i].cat3=''; }
    return a;
  });

  const equalize = () => {
    const n = lines.length;
    const base = parseFloat((total/n).toFixed(2));
    const last = parseFloat((total - base*(n-1)).toFixed(2));
    setLines(lines.map((l,i) => ({...l, montant: i===n-1 ? last : base})));
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-wide">
        <div className="flex-between mb-2">
          <h2 style={{marginBottom:0}}>✂ Ventiler — {row.libelle.slice(0,50)}</h2>
          <button className="btn-ghost" onClick={onClose}>✕</button>
        </div>
        <p style={{color:'var(--txt2)',fontSize:13,marginBottom:'1rem'}}>
          Montant total : <strong>{total.toFixed(2).replace('.',',')} €</strong>
        </p>

        {lines.map((line, i) => (
          <div key={i} style={{display:'grid',gridTemplateColumns:'80px 1fr 140px 160px 120px auto',
            gap:6,alignItems:'end',padding:10,background:'var(--bg2)',borderRadius:7,marginBottom:6}}>
            <div>
              <div style={{fontSize:11,color:'var(--txt2)',marginBottom:3}}>Montant</div>
              <input type="number" step="0.01" value={line.montant}
                onChange={e => upd(i,'montant',parseFloat(e.target.value)||0)}
                style={{padding:'4px 6px',fontSize:12}}/>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--txt2)',marginBottom:3}}>Libellé</div>
              <input type="text" value={line.libelle} onChange={e=>upd(i,'libelle',e.target.value)}
                style={{padding:'4px 8px',fontSize:12}}/>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--txt2)',marginBottom:3}}>CAT1</div>
              <select value={line.cat1} onChange={e=>upd(i,'cat1',e.target.value)}
                style={{padding:'4px',fontSize:11}}>
                <option value="">—</option>
                {CAT1_LIST.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--txt2)',marginBottom:3}}>CAT2</div>
              <select value={line.cat2} onChange={e=>upd(i,'cat2',e.target.value)}
                disabled={!line.cat1} style={{padding:'4px',fontSize:11}}>
                <option value="">—</option>
                {getCat2List(line.cat1).map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--txt2)',marginBottom:3}}>CAT3</div>
              <select value={line.cat3} onChange={e=>upd(i,'cat3',e.target.value)}
                disabled={!line.cat2} style={{padding:'4px',fontSize:11}}>
                <option value="">—</option>
                {getCat3List(line.cat1,line.cat2).map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div style={{paddingBottom:2}}>
              {lines.length > 2 && (
                <button onClick={()=>setLines(p=>p.filter((_,j)=>j!==i))}
                  style={{background:'none',border:'none',cursor:'pointer',color:'var(--rd-fg)',fontSize:16}}>✕</button>
              )}
            </div>
          </div>
        ))}

        <div className="flex mb-3" style={{gap:8}}>
          {lines.length < 6 && (
            <button className="btn-ghost" style={{fontSize:12}}
              onClick={() => setLines(p=>[...p,{montant:0,libelle:row.libelle,cat1:'',cat2:'',cat3:''}])}>
              + Ligne
            </button>
          )}
          <button className="btn-ghost" style={{fontSize:12}} onClick={equalize}>⇌ Égaliser</button>
          <div style={{marginLeft:'auto',fontSize:13,fontWeight:500,color:isOK?'var(--gr-fg)':'var(--am-fg)'}}>
            Somme : {sum.toFixed(2).replace('.',',')} €
            {!isOK && ` (reste ${Math.abs(total-sum).toFixed(2).replace('.',',')} €)`}
          </div>
        </div>

        <div className="flex" style={{justifyContent:'space-between',gap:8}}>
          <button className="btn-ghost" style={{color:'var(--rd-fg)',fontSize:12}}
            onClick={onCancelVent}>
            🗑 Annuler la ventilation
          </button>
          <div className="flex" style={{gap:8}}>
            <button className="btn-ghost" onClick={onClose}>Fermer</button>
            <button className="btn-green" onClick={()=>onSave(lines)} disabled={!isOK}>
              Valider
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

    // Synchronise depuis le parent seulement si l'input n'est pas en focus

          <input ref={libRef} className="inp-inline"

            onChange={e => setLibLocal(e.target.value)}

              <option value="">—</option>{CAT1_LIST.map(c=><option key={c} value={c}>{c}</option>)}

              <option value="">—</option>{c3opts.map(c=><option key={c} value={c}>{c}</option>)}
            </select>

// Memoïzé : ne re-render que si la ligne elle-même change (préserve le DOM + focus dropdown)
const RevRowMemo = React.memo(RevRow);

// ─── STEP 5: RÉVISION ─────────────────────────────────────────────────────────

function Step5({ transactions, matchings, onNext }) {
  const [apiKey] = useState(() => localStorage.getItem(LS_KEY) || '');
  // transactions are already pre-built (from Step3 output or autoCat)
  const [rows, setRows] = useState(() => transactions);
  const [loadIA, setLoadIA] = useState(false);
  const [ventRow, setVentRow] = useState(null);
  // All sections open by default
  const [open, setOpen] = useState({auto:true, ia:true, manual:true});
  // Section assignée UNE SEULE FOIS à l'ouverture — jamais recalculée pendant la révision
  const [sectionMap, setSectionMap] = useState(() => {
    const m = {};
    transactions.forEach(r => { m[r.id] = getRevSection(r); });
    return m;
  });

  // useCallback : référence stable → React.memo sur RevRowMemo reste efficace
  const upd = React.useCallback((id, field, val) => {
    const sy = window.scrollY; // mémoriser position scroll fenêtre
    setRows(p => p.map(r => {
      if (r.id!==id) return r;
      const u = {...r, [field]:val, source:'manual'};
      if (field==='cat1') { u.cat2=''; u.cat3=''; }
      if (field==='cat2') { u.cat3=''; }
      return u;
    }));
    // Restaurer après le re-render (évite le saut en haut de page)
    requestAnimationFrame(() => window.scrollTo(0, sy));
  }, []);
  const openVent = React.useCallback(row => setVentRow(row), []);

  const cancelVent = () => {
    const id = ventRow?.id;
    if (!id) return;
    setRows(prev => prev.map(r => r.id === id
      ? {...r, ventilations:[], cat1:'', cat2:'', cat3:'', source:'manual'}
      : r
    ));
    setSectionMap(prev => ({...prev, [id]: 'manual'})); // déplace vers "À catégoriser"
    setVentRow(null);
  };

  const saveVent = (lines) => {
    setRows(p => p.map(r => r.id===ventRow.id ? {...r, ventilations:lines} : r));
    setVentRow(null);
  };

  const suggestIA = async () => {
    if (!apiKey) { alert('Clé API manquante'); return; }
    const need = rows.filter(r => getSection(r)==='manual');
    if (!need.length) { alert('Aucune ligne sans catégorie.'); return; }
    setLoadIA(true);
    try {
      const list = need.map(r =>
        `ID:${r.id} | ${formatDateFR(r.date)} | ${r.libelle.slice(0,45)} | ${r.contrepartie.slice(0,30)} | ${r.montant.toFixed(2)}€`
      ).join('\n');
      const cats = CAT1_LIST.join(', ');
      const prompt = `SCI maison de campagne. Catégorise ces transactions.
Réponds UNIQUEMENT par un tableau JSON : [{"id":"...","cat1":"...","cat2":"...","cat3":"...","note":"raison courte"}]
CAT1 : ${cats}
Transactions :
${list}`;
      const reply = await callClaude(apiKey, [{role:'user',content:prompt}], '', 3500);
      const m = reply.replace(/```json|```/g,'').trim().match(/\[[\s\S]*\]/);
      if (m) {
        const sugg = JSON.parse(m[0]);
        setRows(p => p.map(r => {
          const s = sugg.find(sg=>sg.id===r.id);
          if (s && getSection(r)==='manual')
            return {...r, cat1:s.cat1||'', cat2:s.cat2||'', cat3:s.cat3||'',
                    source:'ia', iaSuggestion:s.note||''};
          return r;
        }));
      }
    } catch(e) { alert('Erreur IA : ' + e.message); }
    setLoadIA(false);
  };

  // Positions figées — on lit sectionMap (figé), pas getRevSection(row) (dynamique)
  const autoRows   = sortRows(rows.filter(r => sectionMap[r.id] === 'auto'));
  const iaRows     = sortRows(rows.filter(r => sectionMap[r.id] === 'ia'));
  const manualRows = sortRows(rows.filter(r => sectionMap[r.id] === 'manual'));

  // Preserve scroll positions for each section during re-renders
  const scrollRefs = useRef({});
  const scrollPos  = useRef({});

  const Section = ({title, rows:sRows, sKey, variant}) => {
    const divRef = (el) => {
      if (el) {
        scrollRefs.current[sKey] = el;
        // Restore scroll after render
        if (scrollPos.current[sKey] != null)
          el.scrollTop = scrollPos.current[sKey];
      }
    };
    const onScroll = (e) => { scrollPos.current[sKey] = e.target.scrollTop; };
    return (
      <div style={{marginBottom:8}}>
        <button className={`accordion-btn ${variant}`} onClick={()=>setOpen(p=>({...p,[sKey]:!p[sKey]}))}>
          <span>{title}</span>
          <span>{open[sKey] ? '▲' : '▼'}</span>
        </button>
        {open[sKey] && sRows.length > 0 && (
          <div ref={divRef} onScroll={onScroll}
            className="tbl-wrap" style={{marginTop:4,maxHeight:'50vh',overflowY:'auto'}}>
            <table>
              <thead><tr>
                <th style={{width:80}}>Date</th>
                <th style={{minWidth:150}}>Libellé</th>
                <th style={{width:90,textAlign:'right'}}>Montant</th>
                <th style={{width:145}}>CAT1</th>
                <th style={{width:165}}>CAT2</th>
                <th style={{width:130}}>CAT3</th>
                <th style={{width:70}}>N°Fact.</th>
                <th style={{width:80,textAlign:'center'}}>Source</th>
              </tr></thead>
              <tbody>
                {sRows.map(r => <RevRowMemo key={r.id} row={r} onChange={upd} onVentiler={openVent}/>)}
              </tbody>
            </table>
          </div>
        )}
        {open[sKey] && sRows.length===0 && (
          <div style={{padding:'1rem',color:'var(--txt2)',fontSize:13,textAlign:'center'}}>Aucune ligne</div>
        )}
      </div>
    );
  };

  return (
    <div className="card">
      <div className="flex-between mb-2">
        <div>
          <h2 style={{marginBottom:2}}>✏️ Révision</h2>
          <div style={{fontSize:12,color:'var(--txt2)'}}>
            {rows.length} transactions • {autoRows.length} auto • {iaRows.length} IA • {manualRows.length} à traiter
          </div>
        </div>
        <div className="flex" style={{gap:'.5rem'}}>

          <button className="btn-green" onClick={() => onNext(rows)}>Continuer →</button>
        </div>
      </div>

      <Section title={`✓ Catégorisées automatiquement (${autoRows.length})`}
        rows={autoRows} sKey="auto" variant="gr"/>
      <Section title={`🤖 Catégorisées par IA — à vérifier (${iaRows.length})`}
        rows={iaRows} sKey="ia" variant="am"/>
      <Section title={`❓ À catégoriser (${manualRows.length})`}
        rows={manualRows} sKey="manual" variant="rd"/>

      {ventRow && <VentModal row={ventRow} onSave={saveVent} onClose={()=>setVentRow(null)} onCancelVent={cancelVent}/>}
    </div>
  );
}

// ─── STEP 6: EXPORT ───────────────────────────────────────────────────────────

// 11-column TSV: Date | Libellé | Contrepartie | Montant | CAT1 | CAT2 | CAT3 | NFacture | Commentaire | DateAnalyse | Année
function buildExportRows(rows) {
  // 9 colonnes Journal : Date tréso | Date gestion | Libellé | Montant | CAT1 | CAT2 | CAT3 | N°Facture | Commentaire
  const result = [];
  for (const r of rows) {
    if (r.ventilations?.length) {
      for (const v of r.ventilations) {
        result.push([
          formatDateFR(r.date),                                        // 1 — Date trésorerie
          '',                                                          // 2 — Date de gestion (vide)
          v.libelle||r.libelle,                                        // 3 — Libellé
          v.montant.toFixed(2).replace('.',','),                       // 4 — Montant
          v.cat1||'', v.cat2||'', v.cat3||'',                         // 5/6/7 — CAT1/2/3
          r.nFacture||'',                                              // 8 — N° Facture
          `Ventilation ${r.montant.toFixed(2).replace('.',',')}€ |`,  // 9 — Commentaire
        ]);
      }
    } else {
      result.push([
        formatDateFR(r.date),                                          // 1 — Date trésorerie
        '',                                                            // 2 — Date de gestion (vide)
        r.libelle,                                                     // 3 — Libellé
        r.montant.toFixed(2).replace('.',','),                         // 4 — Montant
        r.cat1||'', r.cat2||'', r.cat3||'',                           // 5/6/7 — CAT1/2/3
        r.nFacture||'',                                                // 8 — N° Facture
        r.commentaire||'',                                             // 9 — Commentaire
      ]);
    }
  }
  return result;
}

function Step6({ transactions, onBack }) {
  const [scriptUrl] = useState(() => localStorage.getItem(LS_URL) || '');
  const [sent,   setSent]   = useState(false);
  const [error,  setError]  = useState('');

  const totalAmt = transactions.reduce((s,t)=>s+t.montant,0);
  const recettes = transactions.filter(t=>t.montant>=0).reduce((s,t)=>s+t.montant,0);
  const depenses = transactions.filter(t=>t.montant<0).reduce((s,t)=>s+t.montant,0);
  const todoCount= transactions.filter(t=>!t.cat1).length;
  const exportRows = buildExportRows(transactions);

  const downloadTSV = () => {
    const tsv = exportRows.map(r=>r.join('\t')).join('\n');
    const blob = new Blob([tsv], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `LMDJP_${todayISO()}.tsv`;
    a.click();
  };

  const pushScript = async () => {
    if (!scriptUrl) { setError("URL Apps Script manquante (paramètres ⚙️)"); return; }
    setError('');
    try {
      await fetch(scriptUrl, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'data='+encodeURIComponent(JSON.stringify({rows:exportRows})),
      });
      const dates = transactions.map(t=>t.date).filter(Boolean).sort();
      if (dates.length) localStorage.setItem(LS_DATE, dates[dates.length-1]);
      setSent(true);
    } catch(e) { setError('Erreur : ' + e.message); }
  };

  return (
    <div className="card">
      <div className="flex-between mb-3">
        <h2 style={{marginBottom:0}}>🚀 Export</h2>
        <button className="btn-ghost" onClick={onBack}>← Révision</button>
      </div>

      <div className="flex flex-wrap mb-3" style={{gap:'.75rem'}}>
        {[
          {l:'Transactions', v:transactions.length, c:null},
          {l:'Recettes', v:`+${recettes.toFixed(2).replace('.',',')} €`, c:'var(--gr-fg)'},
          {l:'Dépenses', v:`${depenses.toFixed(2).replace('.',',')} €`, c:'var(--rd-fg)'},
          {l:'Solde net', v:`${totalAmt>=0?'+':''}${totalAmt.toFixed(2).replace('.',',')} €`,
           c:totalAmt>=0?'var(--gr-fg)':'var(--rd-fg)'},
        ].map(s => (
          <div key={s.l} className="stat-box">
            <div className="stat-lbl">{s.l}</div>
            <div className="stat-val" style={s.c?{color:s.c}:{}}>{s.v}</div>
          </div>
        ))}
      </div>

      {todoCount > 0 && <div className="notice notice-am mb-2">⚠️ {todoCount} transaction(s) sans catégorie.</div>}
      {error     && <div className="notice notice-rd mb-2">❌ {error}</div>}
      {sent      && (
        <div className="notice notice-gr mb-2" style={{flexDirection:'column',alignItems:'flex-start'}}>
          <strong>✓ Données envoyées au Google Sheet !</strong>
          <a href={SHEET_URL} target="_blank" rel="noreferrer" style={{fontSize:12,color:'var(--gr-fg)',marginTop:4}}>Ouvrir le Sheet ↗</a>
        </div>
      )}

      <div className="flex flex-wrap mb-3" style={{gap:'.6rem'}}>

        <button className="btn-green" onClick={downloadTSV}>↓ Télécharger TSV</button>
        <a href={SHEET_URL} target="_blank" rel="noreferrer">
          <button className="btn-ghost">Ouvrir Sheet ↗</button>
        </a>
      </div>

      {!scriptUrl && (
        <div className="notice notice-ia mb-3" style={{fontSize:12}}>
          ℹ️ Configure l'URL Apps Script dans ⚙️ pour activer la mise à jour automatique.
        </div>
      )}
    </div>
  );
}

// ─── BUDGET — COMPOSANTS ────────────────────────────────────────────────────

const fmtEur = n => (Math.round(n)).toLocaleString('fr-FR') + ' €';

// ÉTAPE 1 — Hypothèses globales
function BudgetStep1({ data, onNext }) {
  const today = todayISO();
  const [nom, setNom]         = useState('');
  const [periode, setPeriode] = useState('');
  const [apports, setApports] = useState(data.apports || 0);
  const [achats, setAchats]   = useState(data.achatsInitiaux || 0);
  const [inflation, setInflation] = useState(4);
  const [showDetail, setShowDetail] = useState(false);

  // Projection initiale
  const proj0 = useMemo(() => computeChargesProjection(data.annualTotals, 4, today), [data, today]);
  const [charges, setCharges] = useState(proj0?.total || data.lastChargesEstimate || 0);
  const [editingCharges, setEditingCharges] = useState(false);

  // Quand l'inflation change → recalcule les charges (sauf si l'user édite les charges directement)
  const onInflationChange = (val) => {
    const v = parseFloat(val) || 0;
    setInflation(v);
    const p = computeChargesProjection(data.annualTotals, v, today);
    if (p) setCharges(p.total);
  };
  // Quand les charges changent manuellement → back-calcul de l'inflation
  const onChargesChange = (val) => {
    const v = parseFloat(String(val).replace(/[^\d.-]/g,'')) || 0;
    setCharges(v);
    const rate = solveInflationForTotal(data.annualTotals, v, today);
    setInflation(rate);
  };

  const proj = useMemo(() => computeChargesProjection(data.annualTotals, inflation, today), [data, inflation, today]);
  const budgetDispo = apports - achats - charges;
  const lastBudgetEstimatif = data.structural?.budgetEstimatif || 0;
  const ecart = lastBudgetEstimatif ? budgetDispo - lastBudgetEstimatif : null;

  const canNext = nom.trim() && periode.trim();

  return (
    <div className="card">
      <h2 style={{marginBottom:'1rem'}}>📊 Hypothèses du nouveau budget</h2>

      <div style={{display:'flex',flexDirection:'column',gap:'.75rem',marginBottom:'1.25rem'}}>
        <label style={{fontSize:13}}>
          <div style={{color:'var(--txt2)',marginBottom:3}}>Nom du budget</div>
          <input className="inp" value={nom} onChange={e=>setNom(e.target.value)}
            placeholder="Budget Juillet 2026" style={{width:'100%'}}/>
        </label>
        <label style={{fontSize:13}}>
          <div style={{color:'var(--txt2)',marginBottom:3}}>Période (en-tête de colonne)</div>
          <input className="inp" value={periode} onChange={e=>setPeriode(e.target.value)}
            placeholder="Juillet 2026" style={{width:'100%'}}/>
        </label>
      </div>

      <div style={{borderTop:'.5px solid var(--brd)',paddingTop:'1rem',display:'flex',flexDirection:'column',gap:'.6rem'}}>
        {/* Apports */}
        <div className="flex-between" style={{fontSize:14}}>
          <span>APPORTS ASSOCIES (prev.)</span>
          <input className="inp" type="text" value={fmtEur(apports)}
            onChange={e=>setApports(parseFloat(e.target.value.replace(/[^\d.-]/g,''))||0)}
            style={{width:130,textAlign:'right'}}/>
        </div>
        {/* Achats */}
        <div className="flex-between" style={{fontSize:14}}>
          <span>− ACHATS ET FRAIS INITIAUX</span>
          <input className="inp" type="text" value={fmtEur(achats)}
            onChange={e=>setAchats(parseFloat(e.target.value.replace(/[^\d.-]/g,''))||0)}
            style={{width:130,textAlign:'right'}}/>
        </div>
        {/* Charges */}
        <div className="flex-between" style={{fontSize:14}}>
          <span>− CHARGES ET FRAIS COURANTS (prev.)</span>
          <input className="inp" type="text" value={fmtEur(charges)}
            onChange={e=>onChargesChange(e.target.value)}
            style={{width:130,textAlign:'right'}}/>
        </div>
        {/* Détail charges */}
        <button className="btn-ghost" style={{fontSize:12,alignSelf:'flex-start',padding:'2px 6px'}}
          onClick={()=>setShowDetail(s=>!s)}>
          {showDetail ? '▲ Masquer le détail' : '▼ Détail du calcul des charges'}
        </button>
        {showDetail && proj && (
          <div style={{background:'var(--bg2)',borderRadius:8,padding:'12px',fontSize:12,color:'var(--txt2)'}}>
            <div>Années pleines retenues : {proj.fullYears.join(' / ')}</div>
            <div>Réel passé révolu : {fmtEur(proj.realPast)}</div>
            <div>Moyenne année pleine : {fmtEur(proj.avgFullYear)}/an</div>
            <div className="flex" style={{gap:6,alignItems:'center',margin:'6px 0'}}>
              <span>Taux d'inflation :</span>
              <input className="inp" type="number" step="0.1" value={inflation}
                onChange={e=>onInflationChange(e.target.value)} style={{width:70}}/>
              <span>%</span>
            </div>
            <div style={{marginTop:6}}>Projection {proj.detail[0]?.year}–{proj.horizon[1]} :</div>
            {proj.detail.map(d => (
              <div key={d.year} style={{paddingLeft:10}}>
                {d.year} : {fmtEur(d.amount)}{d.prorata<1?` (prorata ${(d.prorata*100).toFixed(0)}%)`:''}
              </div>
            ))}
            <div style={{marginTop:6,fontWeight:600,color:'var(--txt)'}}>
              Total estimé : {fmtEur(proj.total)}
            </div>
          </div>
        )}
      </div>

      {/* Budget disponible */}
      <div style={{borderTop:'.5px solid var(--brd)',marginTop:'1rem',paddingTop:'1rem',textAlign:'center'}}>
        <div style={{fontSize:13,color:'var(--txt2)'}}>= BUDGET DISPONIBLE TRAVAUX</div>
        <div style={{fontSize:28,fontWeight:700,margin:'4px 0'}}>{fmtEur(budgetDispo)}</div>
        {ecart != null && (
          <div style={{fontSize:12,color:'var(--txt2)'}}>
            vs dernier budget : {fmtEur(lastBudgetEstimatif)} · écart : {ecart>=0?'+':''}{fmtEur(ecart)}

      <button className="btn-green" style={{width:'100%',marginTop:'1.25rem',justifyContent:'center'}}
        disabled={!canNext}

          chargesProj: proj ? { realPast:proj.realPast, projected:proj.projected, total:proj.total } : null })}>
        Confirmer les hypothèses →
      </button>
    </div>
  );
}

// Construit la liste des lignes budget (CAT2 headers + CAT3 details) à partir du dernier budget + réel
function buildBudgetLines(data) {
  // On parcourt lastBudgetOrder (qui contient les lignes structurantes ET le détail travaux)
  // On ne garde QUE les lignes de détail travaux (après "TRAVAUX & INVESTISSEMENTS")
  const STRUCT_RE = /apports associes|achats et frais initiaux|charges et frais courants|budget estimatif|travaux & investissements/i;
  const lines = [];
  let inTravaux = false;
  for (const entry of data.lastBudgetOrder) {
    const nl = normLabel(entry.label);
    if (/travaux & investissements/i.test(nl)) { inTravaux = true; continue; }
    if (!inTravaux) continue;
    if (STRUCT_RE.test(nl)) continue;
    const real = data.realByLabel[nl] || 0;
    // Détection CAT2 (header) vs CAT3 : les CAT2 ont un émoji en préfixe dans le sheet
    const isHeader = /[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]/u.test(entry.label);
    lines.push({
      label: entry.label.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{FE0F}]/gu,'').trim(),
      rawLabel: entry.label,
      nl, isHeader,
      prev: entry.montant,
      real,
      budget: Math.max(entry.montant, real), // pré-remplissage MAX(préc, réel)
      comment: '',
    });
  }
  return lines;
}

// ÉTAPE 2 — Pré-remplissage et ajustement automatique
function BudgetStep2({ data, hypo, onNext, onBack }) {
  const lines = useMemo(() => buildBudgetLines(data), [data]);
  // Total alloué = somme des lignes CAT3 uniquement (les headers sont des totaux)
  const totalAlloue = lines.filter(l=>!l.isHeader).reduce((s,l)=>s+l.budget, 0);
  const solde = hypo.budgetDispo - totalAlloue;

  // Recalcul des totaux CAT2 pour affichage
  const headerTotals = {};
  let curHeader = null;
  for (const l of lines) {
    if (l.isHeader) { curHeader = l.nl; headerTotals[curHeader] = 0; }
    else if (curHeader) headerTotals[curHeader] += l.budget;
  }

  return (
    <div className="card">
      <div className="flex-between mb-2">
        <h2>📋 Détail du budget — ajustement automatique</h2>
      </div>
      <div className="notice notice-ia mb-2" style={{fontSize:12}}>
        Chaque ligne est pré-remplie avec le maximum entre le budget précédent et le réel déjà consommé.
        Les lignes 🟠 ont été relevées automatiquement car le réel dépassait l'enveloppe.
      </div>

      {/* Bandeau solde */}
      <div className="flex-between" style={{position:'sticky',top:0,background:'var(--bg)',
        padding:'8px 0',borderBottom:'.5px solid var(--brd)',marginBottom:'.75rem',fontSize:13,zIndex:5}}>
        <span>Budget disponible : <strong>{fmtEur(hypo.budgetDispo)}</strong></span>
        <span>Alloué : <strong>{fmtEur(totalAlloue)}</strong></span>
        <span style={{color: solde>=0 ? 'var(--gr-fg)':'var(--rd-fg)',fontWeight:700}}>
          {solde>=0?'✓ ':'⚠️ '}{solde>=0?'+':''}{fmtEur(solde)}
        </span>
      </div>

      {/* Liste */}
      <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:'1.25rem'}}>
        {lines.map((l,idx) => {
          if (l.isHeader) return (
            <div key={idx} style={{display:'flex',justifyContent:'space-between',
              fontWeight:700,padding:'8px 6px',marginTop:6,background:'var(--bg2)',borderRadius:4}}>
              <span>{l.rawLabel}</span><span>{fmtEur(headerTotals[l.nl]||0)}</span>
            </div>
          );
          const delta = Math.round(l.budget) - Math.round(l.prev);
          const ajuste = delta > 0;
          return (
            <div key={idx} style={{display:'flex',alignItems:'center',gap:8,
              padding:'5px 6px 5px 18px',fontSize:13}}>
              <span style={{flex:1}}>{l.label}</span>
              <span style={{fontSize:11,color:'var(--txt2)',whiteSpace:'nowrap'}}>
                Réel: {fmtEur(l.real)} · Préc: {fmtEur(l.prev)}
              </span>
              <span style={{width:90,textAlign:'right',fontWeight:600}}>{fmtEur(l.budget)}</span>
              <span style={{width:80,fontSize:11,color: ajuste?'var(--am-fg)':'var(--txt2)'}}>
                {ajuste ? `🟠 +${fmtEur(delta)}` : '✓'}
              </span>
            </div>
          );
        })}
      </div>

      <div className="flex" style={{justifyContent:'space-between'}}>
        <button className="btn-ghost" onClick={onBack}>← Hypothèses</button>
        <button className="btn-green" onClick={()=>onNext(lines)}>Passer à l'ajustement →</button>
      </div>
    </div>
  );
}

// ÉTAPE 3 — Ajustement manuel et équilibrage
// Ligne éditable : 2 champs liés (Provision + Total). Total = Réel + Provision.
// Contrôle différé (blur / Enter), flash rouge si Total < réel (provision < 0).
function BudgetRow({ line, onCommit, onComment, commentOpen, onToggleComment }) {
  const [draftTotal, setDraftTotal] = useState(fmtEur(line.budget));
  const [draftProv,  setDraftProv]  = useState(fmtEur(Math.max(0, line.budget - line.real)));
  const [invalid, setInvalid] = useState(false);
  const totalRef = useRef(null);
  const provRef  = useRef(null);

  // Resync depuis le parent quand aucun des 2 champs n'est focus
  useEffect(() => {
    const active = document.activeElement;
    if (active !== totalRef.current && active !== provRef.current) {
      setDraftTotal(fmtEur(line.budget));
      setDraftProv(fmtEur(Math.max(0, line.budget - line.real)));
    }
  }, [line.budget, line.real]);

  const parse = (s) => parseFloat(String(s).replace(/[^\d.-]/g,'')) || 0;

  const flashInvalid = () => { setInvalid(true); setTimeout(()=>setInvalid(false), 2000); };

  // Commit depuis le champ TOTAL
  const commitTotal = () => {
    const total = parse(draftTotal);
    if (total < line.real) {
      onCommit(line.real);
      setDraftTotal(fmtEur(line.real));
      setDraftProv(fmtEur(0));
      flashInvalid();
    } else {
      onCommit(total);
      setDraftTotal(fmtEur(total));
      setDraftProv(fmtEur(total - line.real));
    }
  };
  // Commit depuis le champ PROVISION (toujours ≥ 0)
  const commitProv = () => {
    let prov = parse(draftProv);
    if (prov < 0) { prov = 0; flashInvalid(); }
    const total = line.real + prov;
    onCommit(total);
    setDraftProv(fmtEur(prov));
    setDraftTotal(fmtEur(total));
  };

  const enterBlur = (e) => { if (e.key==='Enter'){ e.preventDefault(); e.target.blur(); } };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 6px 5px 18px',fontSize:13}}>
        <span style={{flex:1}}>{line.label}</span>
        <span style={{fontSize:11,color:'var(--txt2)',whiteSpace:'nowrap'}}>Réel: {fmtEur(line.real)}</span>
        {/* Provision */}
        <div style={{display:'flex',alignItems:'center',gap:3}}>
          <span style={{fontSize:10,color:'var(--txt2)'}}>Prov.</span>
          <input ref={provRef} className="inp" type="text" value={draftProv}
            onChange={e=>setDraftProv(e.target.value)}
            onBlur={commitProv} onKeyDown={enterBlur}
            style={{width:88,textAlign:'right',fontSize:12}}/>
        </div>
        {/* Total */}
        <div style={{display:'flex',alignItems:'center',gap:3,position:'relative'}}>
          <span style={{fontSize:10,color:'var(--txt2)'}}>Total</span>
          <input ref={totalRef} className="inp" type="text" value={draftTotal}
            onChange={e=>setDraftTotal(e.target.value)}
            onBlur={commitTotal} onKeyDown={enterBlur}
            style={{width:96,textAlign:'right',fontWeight:600,
              borderColor: invalid ? 'var(--rd-fg)' : undefined,
              color: invalid ? 'var(--rd-fg)' : undefined,
              transition:'border-color .2s, color .2s'}}/>
          {invalid && (
            <div style={{position:'absolute',right:0,top:'100%',fontSize:10,
              color:'var(--rd-fg)',whiteSpace:'nowrap',marginTop:2}}>
              min : {fmtEur(line.real)}
            </div>
          )}
        </div>
        <button className="btn-ghost" style={{padding:'2px 6px',fontSize:13}}
          onClick={onToggleComment}>💬</button>
      </div>
      {commentOpen && (
        <div style={{padding:'4px 6px 8px 18px'}}>
          <input className="inp" value={line.comment} placeholder="Commentaire (justification de l'évolution)…"
            onChange={e=>onComment(e.target.value)} style={{width:'100%',fontSize:12}}/>
        </div>
      )}
    </div>
  );
}

function BudgetStep3({ data, hypo, initialLines, onNext, onBack }) {
  const [lines, setLines] = useState(initialLines);
  const [openComment, setOpenComment] = useState(null);

  // Commit d'un montant validé par index (le contrôle plancher est fait dans BudgetRow)
  const commitBudget = useCallback((idx, value) => {
    setLines(prev => prev.map((l,i) => i===idx ? {...l, budget: value} : l));
  }, []);
  const updateComment = (idx, val) =>
    setLines(prev => prev.map((l,i) => i===idx ? {...l, comment:val} : l));

  const totalAlloue = lines.filter(l=>!l.isHeader).reduce((s,l)=>s+l.budget, 0);
  const solde = hypo.budgetDispo - totalAlloue;
  const equilibre = Math.abs(solde) < 1;

  const headerTotals = {};
  let curHeader = null;
  for (const l of lines) {
    if (l.isHeader) { curHeader = l.nl; headerTotals[curHeader] = 0; }
    else if (curHeader) headerTotals[curHeader] += l.budget;
  }

  // Force le commit de tout champ en édition avant de quitter l'étape
  const flushAndGo = (fn) => {
    if (document.activeElement && document.activeElement.tagName === 'INPUT') {
      document.activeElement.blur(); // déclenche le commit du champ actif
      setTimeout(() => fn(lines), 50); // laisse le state se mettre à jour
    } else {
      fn(lines);
    }
  };

  return (
    <div className="card">
      <h2 style={{marginBottom:'.5rem'}}>⚖️ Ajustement et équilibrage</h2>
      <div className="notice notice-ia mb-2" style={{fontSize:12}}>
        Deux façons d'éditer chaque ligne : <strong>Total</strong> (enveloppe complète) ou <strong>Prov.</strong> (provision = ce qui reste à dépenser au-delà du réel déjà consommé). Total = Réel + Provision.
      </div>

      {/* Bandeau solde */}
      <div style={{position:'sticky',top:0,background: equilibre?'var(--gr-bg)':'var(--rd-bg)',
        padding:'10px 12px',borderRadius:8,marginBottom:'1rem',zIndex:5,
        border:`.5px solid ${equilibre?'var(--gr-fg)':'var(--rd-fg)'}`}}>
        <div className="flex-between" style={{fontSize:13}}>
          <span>Budget disponible : <strong>{fmtEur(hypo.budgetDispo)}</strong> · Alloué : <strong>{fmtEur(totalAlloue)}</strong></span>
          <span style={{fontWeight:700,color: solde>=0?'var(--gr-fg)':'var(--rd-fg)'}}>
            {equilibre ? '✓ Budget équilibré' : `${solde>=0?'À allouer : +':'À réduire : '}${fmtEur(solde)}`}
          </span>
        </div>
      </div>

      {/* Liste éditable */}
      <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:'1.25rem'}}>
        {lines.map((l,idx) => {
          if (l.isHeader) return (
            <div key={idx} style={{display:'flex',justifyContent:'space-between',
              fontWeight:700,padding:'8px 6px',marginTop:6,background:'var(--bg2)',borderRadius:4}}>
              <span>{l.rawLabel}</span><span>{fmtEur(headerTotals[l.nl]||0)}</span>
            </div>
          );
          return (
            <BudgetRow key={idx} line={l}
              onCommit={(value)=>commitBudget(idx, value)}
              onComment={(val)=>updateComment(idx,val)}
              commentOpen={openComment===idx}
              onToggleComment={()=>setOpenComment(openComment===idx?null:idx)}/>
          );
        })}
      </div>

      <div className="flex" style={{justifyContent:'space-between'}}>
        <button className="btn-ghost" onClick={()=>flushAndGo(onBack)}>← Retour</button>
        <button className={equilibre?'btn-green':'btn-ghost'} disabled={!equilibre}
          onClick={()=>flushAndGo(onNext)}>
          {equilibre ? 'Exporter →' : '⚠️ Budget non équilibré'}
        </button>
      </div>
    </div>
  );
}

// Construit les lignes TSV (format Historisation : Montant / Écart / Commentaire)
function buildBudgetTSV(data, hypo, lines) {
  const rows = [];
  const esc = v => String(v ?? '');
  const ecartCell = (nv, pv) => { const e = Math.round(nv - pv); return e === 0 ? '' : String(e); };

  // Commentaire récapitulatif des hypothèses de charges
  const cp = hypo.chargesProj;
  const chargesComment = cp
    ? `Réel révolu ${fmtEur(cp.realPast)} + projeté ${fmtEur(cp.projected)} (inflation ${hypo.inflation}%) = ${fmtEur(cp.total)} sur 11 ans`
    : '';

  // L1 : nom du budget
  rows.push([hypo.nom, '', '']);
  // L2 : période / écart / commentaires
  rows.push([hypo.periode, 'écart', `Commentaires ${hypo.periode}`]);
  // L3 : apports
  rows.push([String(Math.round(hypo.apports)), '', '']);
  // L4 : achats
  rows.push([String(Math.round(hypo.achats)), '', '']);
  // L5 : charges (avec récap hypothèses en commentaire)
  rows.push([String(Math.round(hypo.charges)), ecartCell(hypo.charges, data.lastChargesEstimate), chargesComment]);
  // L6 : budget estimatif à répartir
  const lastEstim = data.structural?.budgetEstimatif || 0;
  rows.push([String(Math.round(hypo.budgetDispo)), ecartCell(hypo.budgetDispo, lastEstim), '']);
  // L7 : travaux & investissements (= budget dispo)
  rows.push([String(Math.round(hypo.budgetDispo)), ecartCell(hypo.budgetDispo, lastEstim), '']);
  // L8+ : détail travaux
  for (const l of lines) {
    if (l.isHeader) {
      // CAT2 = total de section ; pas de provision sur les en-têtes
      rows.push([String(Math.round(l.budget)), ecartCell(l.budget, l.prev), esc(l.comment)]);
    } else {
      // CAT3 : commentaire = "Provision = X€" + commentaire libre éventuel
      const provision = Math.max(0, Math.round(l.budget - l.real));
      const provText = `Provision = ${fmtEur(provision)}`;
      const fullComment = l.comment ? `${provText} · ${l.comment}` : provText;
      rows.push([String(Math.round(l.budget)), ecartCell(l.budget, l.prev), fullComment]);
    }
  }
  return rows.map(r => r.join('\t')).join('\n');
}

// ÉTAPE 4 — Export
function BudgetStep4({ data, hypo, lines, onBack }) {
  const downloadTSV = () => {
    const tsv = buildBudgetTSV(data, hypo, lines);
    const blob = new Blob([tsv], { type:'text/tab-separated-values' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `LMDJP_${hypo.periode.replace(/\s+/g,'_')}_${todayISO()}.tsv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="card card-sm">
      <h2 style={{marginBottom:'1rem'}}>✅ {hypo.nom}</h2>
      <div className="notice notice-gr mb-2">Budget équilibré et prêt à exporter.</div>
      <ol style={{fontSize:13,color:'var(--txt2)',lineHeight:1.8,paddingLeft:18}}>
        <li>Télécharge le TSV ci-dessous</li>
        <li>Ouvre-le, sélectionne tout (Cmd+A), copie (Cmd+C)</li>
        <li>Dans l'onglet "Historisation budgets", colonne du nouveau budget, cellule du haut</li>
        <li>Colle sans mise en forme (Ctrl+Shift+V)</li>
        <li>Tire la formule d'écart de la colonne précédente sur la nouvelle colonne</li>
      </ol>
      <div className="flex" style={{justifyContent:'space-between',marginTop:'1.25rem'}}>
        <button className="btn-ghost" onClick={onBack}>← Ajustement</button>
        <button className="btn-green" onClick={downloadTSV}>↓ Télécharger TSV</button>
      </div>
    </div>
  );
}

// CONTENEUR — orchestration des 4 étapes budget
function BudgetFlow({ onHome }) {
  const [phase, setPhase] = useState('loading'); // loading | error | s1 | s2 | s3 | s4
  const [data, setData]   = useState(null);
  const [hypo, setHypo]   = useState(null);
  const [lines, setLines] = useState([]);

  useEffect(() => {
    fetchBudgetData().then(d => {
      const hasCharges = d && Object.keys(d.annualTotals).length > 0;
      const hasBudget  = d && d.lastBudgetOrder.length > 0;
      if (!hasCharges || !hasBudget) { setData(d); setPhase('error'); return; }
      setData(d); setPhase('s1');
    }).catch(() => setPhase('error'));
  }, []);

  // Avertissement à la fermeture pendant l'édition
  useEffect(() => {
    if (phase === 's2' || phase === 's3') {
      const h = (e) => { e.preventDefault(); e.returnValue = ''; };
      window.addEventListener('beforeunload', h);
      return () => window.removeEventListener('beforeunload', h);
    }
  }, [phase]);

  if (phase === 'loading') return (
    <div className="card card-sm"><div className="notice" style={{color:'var(--txt2)'}}>
      <span className="spin"/> Chargement des données budgétaires…
    </div></div>
  );
  if (phase === 'error') return (
    <div className="card card-sm">
      <div className="notice notice-rd" style={{marginBottom:'.75rem'}}>
        Impossible de charger toutes les données du Google Sheet.
        {data?.failed?.length > 0 && (
          <div style={{marginTop:8,fontSize:12}}>
            Onglets sans réponse : {data.failed.join(', ')}.
          </div>
        )}
        <div style={{marginTop:8,fontSize:12}}>
          Vérifie que le fichier est partagé en lecture (« Tous les utilisateurs disposant du lien ») et que les noms d'onglets n'ont pas changé.
        </div>
      </div>
      {data?.debug && (
        <pre style={{fontSize:11,background:'var(--bg2)',padding:10,borderRadius:6,
          overflow:'auto',color:'var(--txt2)',marginBottom:'.75rem'}}>
{JSON.stringify(data.debug, null, 2)}
        </pre>
      )}
      <div className="flex" style={{gap:8}}>
        <button className="btn-ghost" onClick={onHome}>← Accueil</button>
        <button className="btn-ghost" onClick={()=>{setPhase('loading');fetchBudgetData().then(d=>{
          const ok = d && Object.keys(d.annualTotals).length>0 && d.lastBudgetOrder.length>0;
          setData(d); setPhase(ok?'s1':'error');
        });}}>↻ Réessayer</button>
      </div>
    </div>
  );

  return (
    <>
      {phase==='s1' && <BudgetStep1 data={data} onNext={h=>{setHypo(h);setPhase('s2');}}/>}
      {phase==='s2' && <BudgetStep2 data={data} hypo={hypo}
        onNext={l=>{setLines(l);setPhase('s3');}} onBack={()=>setPhase('s1')}/>}
      {phase==='s3' && <BudgetStep3 data={data} hypo={hypo} initialLines={lines}
        onNext={l=>{setLines(l);setPhase('s4');}} onBack={l=>{setLines(l);setPhase('s2');}}/>}
      {phase==='s4' && <BudgetStep4 data={data} hypo={hypo} lines={lines}
        onBack={()=>setPhase('s3')}/>}
    </>
  );
}
